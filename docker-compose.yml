version: '3.8'

services:
  coupo-site:
    container_name: coupon-site-app
    build: .
    restart: always
    ports:
      - "3000:3000"
    volumes:
      # Persist the SQLite database file
      - ./prisma/dev.db:/app/prisma/dev.db
      # Persist uploads if any (e.g., /public/uploads)
      - ./public/uploads:/app/public/uploads
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-changeme_in_production_secret_key_12345}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
